name: Release Tauri

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Pre-release?"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            label: linux
          - runner: macos-latest
            label: macos
          - runner: windows-latest
            label: windows
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            librsvg2-dev patchelf libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Build Tauri
        run: npm run tauri:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          {
            echo "## What's Changed"
            echo ""
            if [ -z "$PREV_TAG" ]; then
              LOG=$(git log --oneline --no-merges --format="%s")
            else
              LOG=$(git log --oneline --no-merges --format="%s" "${PREV_TAG}..HEAD")
            fi
            if [ -z "$LOG" ]; then
              echo "Initial release."
            else
              echo "$LOG" | while IFS= read -r msg; do
                case "$msg" in
                  feat:*) echo "- :sparkles: ${msg#feat: }" ;;
                  feat\(*\):*) echo "- :sparkles: ${msg#*: }" ;;
                  fix:*)   echo "- :bug: ${msg#fix: }" ;;
                  fix\(*\):*) echo "- :bug: ${msg#*: }" ;;
                  docs:*)  echo "- :books: ${msg#docs: }" ;;
                  docs\(*\):*) echo "- :books: ${msg#*: }" ;;
                  chore:*) echo "- :wrench: ${msg#chore: }" ;;
                  chore\(*\):*) echo "- :wrench: ${msg#*: }" ;;
                  ci:*)    echo "- :gear: ${msg#ci: }" ;;
                  ci\(*\):*) echo "- :gear: ${msg#*: }" ;;
                  test:*)  echo "- :white_check_mark: ${msg#test: }" ;;
                  test\(*\):*) echo "- :white_check_mark: ${msg#*: }" ;;
                  refactor:*) echo "- :recycle: ${msg#refactor: }" ;;
                  refactor\(*\):*) echo "- :recycle: ${msg#*: }" ;;
                  perf:*)  echo "- :zap: ${msg#perf: }" ;;
                  perf\(*\):*) echo "- :zap: ${msg#*: }" ;;
                  *)       echo "- ${msg}" ;;
                esac
              done
            fi
          } > /tmp/release-notes.md
          cat /tmp/release-notes.md
          echo "notes_file=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: /tmp/release-notes.md
          files: artifacts/**/*
          draft: true
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease == 'true' || contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
